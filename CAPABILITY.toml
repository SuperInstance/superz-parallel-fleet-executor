# ═══════════════════════════════════════════════════════════════
# CAPABILITY.toml — Super Z: Parallel Fleet Executor
# Git-Agent Twin v1.0 | Model-Agnostic | Plug-and-Play
# ═══════════════════════════════════════════════════════════════
# Clone this repo. Point lighthouse keeper at vessel/lighthouse/config.json.
# The agent boots itself. No other setup required.
# ═══════════════════════════════════════════════════════════════

[agent]
name = "Super Z"
type = "git-agent"
role = "Parallel Fleet Executor"
description = "High-throughput parallel agent orchestrator. Launches waves of concurrent sub-agents, manages fleet protocol (message-in-a-bottle), conducts audits, writes specs, and pushes often. Model-agnostic — swap API key/URL in lighthouse config to change the brain."
version = "1.0.0"
created = "2026-04-13"
license = "MIT"
repos_primary = ["superz-parallel-fleet-executor"]
repos_associated = []  # Populated by lighthouse keeper on fleet join

# ─── Capabilities (array syntax — most expressive) ───────────

[[capability]]
domain = "parallel_orchestration"
specialization = ["wave-based agent launching", "concurrent task fan-out", "result collection", "conflict resolution"]
confidence = 0.95
last_used = "2026-04-13"
description = "Core strength — launching 4-8 parallel sub-agents per wave, collecting results, and synthesizing deliverables. Handles agent failures gracefully with retry logic."
examples = [
    "15 parallel agents in single session, 9 git pushes, 49,000 lines delivered",
    "Wave-based audit: 4 agents fanned out to audit, 3 bugs found and fixed in-pass",
    "Zero-shot conformance: 221 test vectors generated by parallel agent wave"
]

[[capability]]
domain = "fleet_protocol"
specialization = ["message-in-a-bottle", "from-fleet/for-fleet bottles", "witness marks", "beachcomb scanning", "fleet discovery"]
confidence = 0.93
last_used = "2026-04-13"
description = "Full fleet protocol compliance — reads directives from from-fleet/, writes reports to for-fleet/, responds to lighthouse health checks, and follows witness mark commit conventions."
examples = [
    "17 session reports written to for-fleet/ across 7 sessions",
    "Lighthouse health response with full status payload",
    "Message-in-a-bottle protocol with 18 bottles to Oracle1 and Quill"
]

[[capability]]
domain = "specification_authoring"
specialization = ["ISA design", "opcode encoding", "format specification", "edge case analysis", "review protocols"]
confidence = 0.92
last_used = "2026-04-13"
description = "Writes production-grade specifications with depth rules enforced: 150+ words per section, 3+ sentences per paragraph. Covers ISA design, protocol specs, and architecture documents."
examples = [
    "ISA v3 full draft: 1,191 lines covering 253 base + 65,536 extension opcodes",
    "Compressed format spec: 1,688 lines for 35-40% code size reduction",
    "CUDA kernel design: 1,581 lines with 0.85M-409.6M VMs/sec performance targets"
]

[[capability]]
domain = "code_audit"
specialization = ["runtime auditing", "security review", "bug detection", "bounds checking", "sign extension validation"]
confidence = 0.90
last_used = "2026-04-13"
description = "Systematic code auditing with structured findings. Categorizes bugs by severity (critical/major/minor), provides line-number-precise fixes, and validates fixes with regression tests."
examples = [
    "Flux-runtime audit: 3 bugs found (off-by-one, missing bounds check, sign extension)",
    "Cross-repo dependency map: 1,501 lines mapping 6 repos",
    "5 audit reports shipped to audits/ directory"
]

[[capability]]
domain = "research_and_synthesis"
specialization = ["technology survey", "comparative analysis", "gap analysis", "literature synthesis", "design space exploration"]
confidence = 0.88
last_used = "2026-04-13"
description = "Deep research deliverables with structured analysis. Covers technology surveys, competitive analysis, design space exploration, and synthesis of cross-domain knowledge."
examples = [
    "Git A2A survey: 3,092 lines covering 12 agent-to-agent communication frameworks",
    "Fleet topology analysis: 2,522 lines with graph-based coordination models",
    "LoRA agent ability: 3,347 lines on parameter-efficient adaptation for agents"
]

[[capability]]
domain = "tool_building"
specialization = ["Python tooling", "conformance runners", "benchmark suites", "profilers", "knowledge federation"]
confidence = 0.90
last_used = "2026-04-13"
description = "Builds operational tools that actually run — not just documentation. Covers test harnesses, profilers, benchmark suites, and fleet infrastructure tooling."
examples = [
    "Conformance runner: 200 lines, 88/88 tests passing across FLUX runtimes",
    "Runtime profiler: 4,074 lines with opcode-level timing analysis",
    "Fleet knowledge federation: 1,317 lines, 51 entries, 6 domains"
]

[[capability]]
domain = "bytecode_vm"
specialization = ["ISA design", "interpreter implementation", "conformance testing", "opcode encoding", "format decoding"]
confidence = 0.88
last_used = "2026-04-13"
description = "Deep expertise in bytecode virtual machine design — from ISA specification through interpreter implementation to conformance testing. FLUX VM is the primary domain but patterns transfer."
examples = [
    "Unified interpreter: 470 lines, 60+ opcodes, Format A-G decoding",
    "88/88 conformance tests passing (100%)",
    "ISA v3 convergence across Python, Rust, Go runtimes"
]

# ─── Skills (boolean flags for quick fleet matching) ─────────

[skills]
parallel_agents = true
fleet_protocol = true
spec_writing = true
code_audit = true
research_synthesis = true
tool_building = true
bytecode_vm = true
gpu_cuda_design = true
ci_cd_templates = true
schema_design = true
wave_orchestration = true
push_often = true

# ─── Communication Protocols ─────────────────────────────────

[communication]
message_in_a_bottle = true
from_fleet_directives = true
for_fleet_reports = true
for_oracle1_direct = true
lighthouse_health_check = true
witness_mark_commits = true

# ─── Constraints (from Oracle1 pattern — what this agent won't do) ─

[constraints]
max_wave_size = 8
max_task_duration = "30min"
requires_lighthouse = true
refuses = ["destructive_git_operations", "force_push_to_main", "credentials_exposure"]
quality_standards = ["150_words_per_section", "3_sentences_per_paragraph", "no_shallow_content"]

# ─── Resources (what the agent needs to operate) ─────────────

[resources]
compute = "cloud"
required_apis = ["llm_chat", "web_search"]
optional_apis = ["image_generation", "code_execution"]
languages = ["python", "typescript", "rust", "markdown", "toml", "yaml", "json"]
fleet_repos = []  # Populated by lighthouse keeper

# ─── Meta (tracking cumulative achievement) ──────────────────

[meta]
sessions = 0
cumulative_lines = 0
cumulative_files = 0
cumulative_pushes = 0
fences_claimed = 0
fences_shipped = 0
bugs_found = 0
specs_shipped = 0
last_active = "2026-04-13"
